<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGA Championship 2026 · Pool Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1a2e;--navy:#0e2340;--gold:#c9a84c;--gl:#e8c96a;--cream:#f0e6c8;--txt:#dde8f0;--mut:#6a8ea8;--dim:#2d4a62;--red:#e05252;--grn:#4caf7a;--blue:#6aaddf}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Crimson Pro',Georgia,serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(14,35,64,.6) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 90%,rgba(11,26,46,.9) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 14px 60px}
header{text-align:center;padding:28px 12px 16px;border-bottom:1px solid rgba(201,168,76,.25);margin-bottom:20px}
.flag{font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
h1{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,42px);font-weight:700;color:var(--cream);line-height:1.1}
.sub{font-size:11px;letter-spacing:4px;color:var(--mut);text-transform:uppercase;margin-top:4px}
.divider{width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto}
.ctrl{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
#rbtn{background:var(--gold);color:var(--bg);border:none;padding:10px 24px;font-family:'Crimson Pro',serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-radius:3px;cursor:pointer}
#rbtn:disabled{background:var(--dim);color:var(--mut);cursor:not-allowed}
#rstatus{font-size:12px;color:var(--dim);letter-spacing:1px}
#rerr{font-size:13px;color:#f97316;margin-top:4px;text-align:center;min-height:14px}
.tcard{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);border-radius:8px;margin-bottom:10px;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tcard.lead{border-color:var(--gold);box-shadow:0 0 24px rgba(201,168,76,.1);background:linear-gradient(135deg,rgba(14,35,64,.9),rgba(11,26,46,.9))}
.trow{display:flex;align-items:center;padding:14px;gap:12px}
.place{width:44px;text-align:center;font-size:22px;flex-shrink:0}
.oinfo{flex:1;min-width:0}
.oowner{font-family:'Playfair Display',serif;font-size:20px;color:var(--cream)}
.ohint{font-size:10px;color:var(--dim);letter-spacing:1px;margin-top:2px}
.tscore{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;min-width:56px;text-align:right;flex-shrink:0}
.pdet{display:none;border-top:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2);padding:10px 14px 14px}
.pdet.open{display:block}
.prow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.prow:last-of-type{border-bottom:none}
.prow.drop .pn,.prow.drop .ps{opacity:.35;text-decoration:line-through}
.pn{font-size:15px;color:var(--mut);flex:1;padding-right:8px}
.ps{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;min-width:40px;text-align:right}
.totrow{display:flex;justify-content:space-between;padding-top:8px;margin-top:6px;border-top:1px solid rgba(201,168,76,.2);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.totrow span:last-child{font-family:'Playfair Display',serif;font-size:17px;font-weight:600}
.under{color:var(--red)}.even{color:#fff}.over{color:var(--blue)}.na{color:var(--dim)}
.legend{margin-top:18px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:5px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-size:12px;color:var(--dim)}
.footer{text-align:center;margin-top:12px;font-size:10px;letter-spacing:2px;color:rgba(45,74,98,.5);text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="flag">Aronimink Golf Club &middot; May 14&ndash;17, 2026</div>
  <h1>&#9971; PGA Championship</h1>
  <div class="sub">Pool Leaderboard</div>
  <div class="divider"></div>
</header>

<div class="ctrl">
  <button id="rbtn" onclick="fetchScores()">&#8635; Refresh Scores</button>
  <div id="rstatus"></div>
</div>
<div id="rerr"></div>
<div id="lb" style="margin-top:14px"></div>
<div class="legend">
  <span><b class="under">RED</b> = Under par</span>
  <span><b class="even">E</b> = Even</span>
  <span><b class="over">+N</b> = Over par</span>
  <span><b class="na">&#8211;</b> = Pending</span>
</div>
<div class="footer">Live scores via ESPN &middot; PGA Championship 2026</div>
</div>

<script>
'use strict';

// ── TEAMS (draft picks, minus cut players) ──
const TEAMS = [
  {
    owner: 'AW',
    players: [
      'Cameron Young',
      'Jon Rahm',
      'Patrick Cantlay',
      'Hideki Matsuyama',
    ]
  },
  {
    owner: 'DJ',
    players: [
      'Rory McIlroy',
      'Tommy Fleetwood',
      'Shane Lowry',
      'Min Woo Lee',
    ]
  },
  {
    owner: 'JG',
    players: [
      'Scottie Scheffler',
      'Brooks Koepka',
      'Collin Morikawa',
      'Jason Day',
    ]
  },
  {
    owner: 'Nick',
    players: [
      'Xander Schauffele',
      'Ludvig Aberg',
      'Chris Gotterup',
      'Justin Thomas',
    ]
  },
];

const ESPN_URLS = [
  'https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard?event=401811947',
  'https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard',
  'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard',
];

let scores = {};
let expanded = new Set();

// ── HELPERS ──
const nm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z\s]/g,'').trim();
const fmt = s => s===null||s===undefined ? '–' : s===0 ? 'E' : s>0 ? `+${s}` : `${s}`;
const sc  = s => s===null||s===undefined ? 'na' : s<0 ? 'under' : s===0 ? 'even' : 'over';
const parseS = v => {
  if(v===null||v===undefined) return null;
  const s = String(v).trim();
  if(s==='E'||s==='EVEN') return 0;
  const n = parseInt(s.replace('+',''), 10);
  return isNaN(n) ? null : n;
};

function buildLookup() {
  const lk = {};
  TEAMS.flatMap(t => t.players).forEach(p => {
    lk[nm(p)] = p;
    const pts = p.trim().split(' ');
    const last = nm(pts[pts.length-1]);
    if(!lk[last]) lk[last] = p;
    if(pts.length > 2) {
      const fl = nm(pts[0] + ' ' + pts[pts.length-1]);
      if(!lk[fl]) lk[fl] = p;
    }
  });
  return lk;
}

function getTotal(team) {
  const nums = team.players.map(p => scores[p]).filter(v => v !== null && v !== undefined);
  return nums.length === 0 ? null : nums.reduce((a,b) => a+b, 0);
}

function renderLb() {
  const has = Object.values(scores).some(v => v !== null && v !== undefined);
  const ranked = TEAMS
    .map(t => ({ ...t, total: getTotal(t), scored: t.players.filter(p => scores[p] !== null && scores[p] !== undefined).length }))
    .sort((a,b) => {
      if(!has) return a.owner.localeCompare(b.owner);
      if(a.total===null && b.total===null) return 0;
      if(a.total===null) return 1;
      if(b.total===null) return -1;
      return a.total - b.total;
    });

  // Place labels
  const labels = [];
  let i = 0;
  while(i < ranked.length) {
    const t = ranked[i].total;
    if(t===null) { labels.push('–'); i++; continue; }
    let j = i;
    while(j < ranked.length && ranked[j].total === t) j++;
    const lbl = (j-i > 1) ? `T${i+1}` : `${i+1}`;
    for(let k=i; k<j; k++) labels.push(lbl);
    i = j;
  }

  document.getElementById('lb').innerHTML = ranked.map((team, idx) => {
    const isLead = has && idx===0 && team.total !== null;
    const open = expanded.has(team.owner);
    const place = !has ? '&#9971;' : isLead ? '&#127942;' : `<span style="font-size:13px;display:block;color:var(--dim);line-height:1">${labels[idx]}</span>`;

    const rows = team.players.map(p => {
      const s = scores[p];
      return `<div class="prow">
        <div class="pn">${p}</div>
        <div class="ps ${sc(s)}">${fmt(s)}</div>
      </div>`;
    }).join('');

    return `<div class="tcard ${isLead ? 'lead' : ''}">
      <div class="trow" onclick="togExp('${team.owner}')">
        <div class="place">${place}</div>
        <div class="oinfo">
          <div class="oowner">${team.owner}</div>
          <div class="ohint">${has ? `${team.scored}/${team.players.length} scored &middot; ` : ''}${open ? 'tap to collapse' : 'tap to expand'}</div>
        </div>
        <div class="tscore ${sc(team.total)}">${fmt(team.total)}</div>
      </div>
      <div class="pdet ${open ? 'open' : ''}">
        ${rows}
        <div class="totrow"><span>Team Total</span><span class="${sc(team.total)}">${fmt(team.total)}</span></div>
      </div>
    </div>`;
  }).join('');
}

function togExp(o) { expanded.has(o) ? expanded.delete(o) : expanded.add(o); renderLb(); }

async function fetchScores() {
  const btn = document.getElementById('rbtn');
  const st  = document.getElementById('rstatus');
  const er  = document.getElementById('rerr');
  if(btn) btn.disabled = true;
  if(er)  er.textContent = '';
  const lk = buildLookup();
  let lastErr = '';

  for(let i=0; i<ESPN_URLS.length; i++) {
    if(st) st.textContent = 'Fetching\u2026';
    try {
      const res = await fetch(ESPN_URLS[i], { cache: 'no-store' });
      if(!res.ok) { lastErr = `HTTP ${res.status}`; continue; }
      const data = await res.json();
      const comps =
        data?.events?.[0]?.competitions?.[0]?.competitors ||
        data?.competitions?.[0]?.competitors ||
        data?.competitors || [];
      if(!comps.length) { lastErr = 'No players'; continue; }

      const ns = {};
      comps.forEach(c => {
        const name = c.athlete?.displayName || c.displayName || c.name || '';
        if(!name) return;
        const pts = name.trim().split(' ');
        const matched =
          lk[nm(name)] ||
          lk[nm(pts[0] + ' ' + pts[pts.length-1])] ||
          lk[nm(pts[pts.length-1])];
        if(!matched) return;
        const val =
          c.statistics?.find(s => s.name === 'overallToPar')?.displayValue ??
          c.statistics?.find(s => s.name === 'scoreToPar')?.displayValue ??
          c.score?.displayValue ?? c.toPar ?? null;
        ns[matched] = parseS(val);
      });

      TEAMS.flatMap(t => t.players).forEach(p => { if(!(p in ns)) ns[p] = null; });
      scores = ns;

      const ct = Object.values(scores).filter(v => v !== null).length;
      if(st) st.textContent = `Updated ${new Date().toLocaleTimeString()} \u00b7 ${ct} scored`;
      renderLb();
      if(btn) btn.disabled = false;
      return;
    } catch(e) { lastErr = e.message; }
  }

  if(er) er.textContent = `Could not load scores: ${lastErr}`;
  if(st) st.textContent = '';
  if(btn) btn.disabled = false;
}

// ── INIT ──
renderLb();
fetchScores();
// Auto-refresh every 5 minutes
setInterval(fetchScores, 5 * 60 * 1000);
</script>
</body>
</html>
